name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        # tag format: v1.2.3
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "full=${TAG}" >> "$GITHUB_OUTPUT"
          echo "major=${TAG%%.*}" >> "$GITHUB_OUTPUT"
          echo "minor=${TAG%.*}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            zeabur/caddy-static:latest
            zeabur/caddy-static:${{ steps.version.outputs.full }}
            zeabur/caddy-static:${{ steps.version.outputs.minor }}
            zeabur/caddy-static:${{ steps.version.outputs.major }}
