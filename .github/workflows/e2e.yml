name: E2E Tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  e2e:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build image
        run: docker build -t zeabur/caddy-static .

      - name: Run e2e tests
        run: go test -v -timeout 120s ./e2etest
